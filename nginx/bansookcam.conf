server {
    listen 8080;
    server_name _;

    # Basic auth — protects both the UI and the HLS streams
    auth_basic "BansookCam";
    auth_basic_user_file /etc/nginx/bansookcam.htpasswd;

    root /home/rachel/Bansook/BansookCam/pwa;
    index index.html;

    # PWA static files
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # HLS streams — proxy to MediaMTX
    location /hls/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Required for LL-HLS chunked transfer
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;

        # CORS not needed (same origin through proxy)
        add_header Cache-Control "no-store";
    }
}
