<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BansookCam">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>BansookCam</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 8px 8px;
    }

    .cam-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      min-height: 200px;
    }

    .cam-label {
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .cam-wrap {
      flex: 1;
      position: relative;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .cam-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #555;
      pointer-events: none;
    }

    .cam-status.hidden { display: none; }

    /* Landscape: side-by-side */
    @media (orientation: landscape) {
      main { flex-direction: row; }
    }

    /* Large screens: limit width */
    @media (min-width: 900px) {
      main { max-width: 900px; margin: 0 auto; width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>BansookCam</h1>
  </header>

  <main>
    <div class="cam-card">
      <div class="cam-label">Camera 1</div>
      <div class="cam-wrap">
        <video id="video0" autoplay muted playsinline></video>
        <div class="cam-status" id="status0">Connecting...</div>
      </div>
    </div>

    <div class="cam-card">
      <div class="cam-label">Camera 2</div>
      <div class="cam-wrap">
        <video id="video1" autoplay muted playsinline></video>
        <div class="cam-status" id="status1">Connecting...</div>
      </div>
    </div>
  </main>

  <!-- hls.js for Android Chrome (iOS uses native HLS via src= on <video>) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    const streams = [
      { videoId: 'video0', statusId: 'status0', src: '/hls/cam0/index.m3u8' },
      { videoId: 'video1', statusId: 'status1', src: '/hls/cam1/index.m3u8' },
    ];

    function initStream({ videoId, statusId, src }) {
      const video = document.getElementById(videoId);
      const status = document.getElementById(statusId);

      function onPlaying() { status.classList.add('hidden'); }
      function onError(msg) { status.textContent = msg; status.classList.remove('hidden'); }

      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // iOS Safari — native LL-HLS
        video.src = src;
        video.addEventListener('playing', onPlaying);
        video.addEventListener('error', () => onError('Stream unavailable'));
        video.play().catch(() => {});
      } else if (Hls.isSupported()) {
        // Android Chrome + others — hls.js
        const hls = new Hls({
          lowLatencyMode: true,
          liveSyncDurationCount: 2,
          liveMaxLatencyDurationCount: 4,
          maxBufferLength: 8,
        });
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) onError('Stream unavailable');
        });
        video.addEventListener('playing', onPlaying);
      } else {
        onError('HLS not supported in this browser');
      }
    }

    streams.forEach(initStream);
  </script>
</body>
</html>
